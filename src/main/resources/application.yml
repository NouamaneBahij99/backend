server:
  port: 8080
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

spring:
  application:
    name: pelican-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/pelican_db
    username: ${DB_USERNAME:pelican_user}
    password: ${DB_PASSWORD:changeme_strong_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 25
          fetch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Configuration JWT
app:
  jwt:
    secret: ${JWT_SECRET:VotreCleSecreteUltraLongueEtComplexeMinimum256BitsPourPelicanApp2024MagentaTechnoSenegal}
    expiration: 900000
    refresh-expiration: 604800000
  
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:8080}
  
  security:
    max-login-attempts: 5
    lock-duration-minutes: 30

logging:
  level:
    root: INFO
    com.magentatechno.pelican: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
  file:
    name: logs/pelican-backend.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
